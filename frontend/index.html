<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatSpace — Real-Time Chat</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Auth screen -->
  <section id="auth-screen" class="screen">
    <div class="auth-card">
      <h1>ChatSpace</h1>
      <p class="subtitle">A Slack-lite real-time chat app</p>

      <div class="tabs">
        <button id="tab-login" class="tab active">Login</button>
        <button id="tab-register" class="tab">Register</button>
      </div>

      <form id="auth-form">
        <input type="text" id="username" placeholder="Username" required minlength="3" />
        <input type="password" id="password" placeholder="Password" required minlength="6" />
        <button type="submit" id="auth-submit">Login</button>
      </form>

      <p id="auth-error" class="error-text"></p>
    </div>
  </section>

  <!-- Main chat screen -->
  <section id="chat-screen" class="screen hidden">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Rooms</h2>
        <button id="new-room-btn" title="Create room">+</button>
      </div>
      <ul id="room-list"></ul>

      <div class="sidebar-footer">
        <span id="current-username"></span>
        <button id="logout-btn">Logout</button>
      </div>
    </aside>

    <main class="chat-main">
      <header class="chat-header">
        <h2 id="active-room-name">Select a room</h2>
        <div id="online-users" class="online-users"></div>
      </header>

      <div id="messages" class="messages"></div>

      <div id="typing-indicator" class="typing-indicator"></div>

      <form id="message-form" class="message-form">
        <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off" disabled />
        <button type="submit" id="send-btn" disabled>Send</button>
      </form>
    </main>
  </section>

  <!-- New room modal -->
  <div id="room-modal" class="modal hidden">
    <div class="modal-content">
      <h3>Create a room</h3>
      <form id="room-form">
        <input type="text" id="room-name" placeholder="Room name" required minlength="2" />
        <input type="text" id="room-description" placeholder="Description (optional)" />
        <div class="modal-actions">
          <button type="button" id="cancel-room-btn">Cancel</button>
          <button type="submit">Create</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/socket.io.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
